name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  DJANGO_SETTINGS_MODULE: config.settings.dev
  SECRET_KEY: ci-only-not-for-production-xK9mP2qR8vL5nW
  DATABASE_URL: postgres://omnifreight:omnifreight@localhost:5432/omnifreight_test
  REDIS_URL: redis://localhost:6379/0
  DEBUG: "True"
  ALLOWED_HOSTS: "localhost,127.0.0.1"

jobs:

  backend-tests:
    name: backend-tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: omnifreight
          POSTGRES_PASSWORD: omnifreight
          POSTGRES_DB: omnifreight_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: backend
      - name: Run tests
        run: pytest tests/ -v --tb=short
        working-directory: backend

  backend-lint:
    name: backend-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install ruff
        run: pip install "ruff==0.4.*"
      - name: Lint
        run: ruff check .
        working-directory: backend

  backend-sast:
    name: backend-sast
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install bandit
        run: pip install "bandit[toml]"
      - name: Security scan
        run: bandit -r apps/ config/ -ll -c pyproject.toml
        working-directory: backend

  backend-deps:
    name: backend-deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: backend
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Audit dependencies
        run: pip-audit --skip-editable
        working-directory: backend

  migration-checks:
    name: migration-checks
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: omnifreight
          POSTGRES_PASSWORD: omnifreight
          POSTGRES_DB: omnifreight_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: backend
      - name: Check no unapplied migrations
        run: python manage.py migrate --check
        working-directory: backend
      - name: Check no missing migrations
        run: python manage.py makemigrations --check --dry-run
        working-directory: backend

  frontend-build:
    name: frontend-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        run: npm install
        working-directory: frontend
      - name: Build
        run: npm run build
        working-directory: frontend

  frontend-deps:
    name: frontend-deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        run: npm install
        working-directory: frontend
      - name: Audit dependencies
        run: npm audit --audit-level=critical
        working-directory: frontend
